name: Package MaoqiuPlayer

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  desktop:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: MaoqiuPlayer-macOS
            package_name: MaoqiuPlayer-macOS.dmg
          - os: windows-latest
            artifact_name: MaoqiuPlayer-Windows
            package_name: MaoqiuPlayer-Windows-Setup.exe
          - os: ubuntu-latest
            artifact_name: MaoqiuPlayer-Linux
            package_name: maoqiu-player_0.1.18_amd64.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libpulse0 \
            fakeroot

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m pytest -q

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: pyinstaller --noconfirm --clean --windowed --name MaoqiuPlayer --icon assets/icons/maoqiu-player.icns --add-data "assets:assets" main.py

      - name: Build Windows app
        if: runner.os == 'Windows'
        run: pyinstaller --noconfirm --clean --onedir --windowed --name MaoqiuPlayer --icon assets/icons/maoqiu-player.ico --add-data "assets;assets" main.py

      - name: Build Linux app
        if: runner.os == 'Linux'
        run: pyinstaller --noconfirm --clean --onedir --name MaoqiuPlayer --add-data "assets:assets" main.py

      - name: Create macOS PKG installer DMG
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist-pkg dmg-root
          pkgbuild \
            --component dist/MaoqiuPlayer.app \
            --install-location /Applications \
            dist-pkg/MaoqiuPlayer-macOS.pkg
          cp dist-pkg/MaoqiuPlayer-macOS.pkg dmg-root/
          hdiutil create -volname MaoqiuPlayer -srcfolder dmg-root -ov -format UDZO "${{ matrix.package_name }}"

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Create Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-installer | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\windows\MaoqiuPlayer.iss
          Copy-Item dist-installer\MaoqiuPlayer-Windows-Setup.exe "${{ matrix.package_name }}"

      - name: Create Linux DEB installer
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          PKG_ROOT="dist-deb/maoqiu-player"
          mkdir -p "$PKG_ROOT/DEBIAN" "$PKG_ROOT/opt/MaoqiuPlayer" "$PKG_ROOT/usr/share/applications" "$PKG_ROOT/usr/share/icons/hicolor/256x256/apps"
          cp -R dist/MaoqiuPlayer/* "$PKG_ROOT/opt/MaoqiuPlayer/"
          cp assets/icons/maoqiu-player-256.png "$PKG_ROOT/usr/share/icons/hicolor/256x256/apps/maoqiu-player.png"
          cat > "$PKG_ROOT/usr/share/applications/maoqiu-player.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=MaoqiuPlayer
          Name[zh_CN]=毛球播放器
          Exec=/opt/MaoqiuPlayer/MaoqiuPlayer
          Icon=maoqiu-player
          Categories=AudioVideo;Player;
          Terminal=false
          DESKTOP
          cat > "$PKG_ROOT/DEBIAN/control" <<'CONTROL'
          Package: maoqiu-player
          Version: 0.1.18
          Section: video
          Priority: optional
          Architecture: amd64
          Maintainer: Maoqiu <quiwe@qq.com>
          Description: MaoqiuPlayer local media player
           MaoqiuPlayer is a cross-platform local media player for videos, images, media library management, and private media packages.
          CONTROL
          fakeroot dpkg-deb --build "$PKG_ROOT" "${{ matrix.package_name }}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_name }}
          if-no-files-found: error

  android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build APK
        working-directory: mobile/android
        run: gradle :app:assembleRelease

      - name: Prepare APK
        run: cp mobile/android/app/build/outputs/apk/release/app-release.apk MaoqiuPlayer-Android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaoqiuPlayer-Android
          path: MaoqiuPlayer-Android.apk
          if-no-files-found: error

  ios:
    name: Build unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: mobile/ios
        run: xcodegen generate

      - name: Build unsigned app
        working-directory: mobile/ios
        run: |
          xcodebuild \
            -project MaoqiuPlayer.xcodeproj \
            -scheme MaoqiuPlayer \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        working-directory: mobile/ios
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/MaoqiuPlayer.app"
          test -n "$APP_PATH"
          test -d "$APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ../../MaoqiuPlayer-iOS.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MaoqiuPlayer-iOS
          path: MaoqiuPlayer-iOS.ipa
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [desktop, android, ios]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: MaoqiuPlayer-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ls -lh release-assets
          PREVIOUS_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 --json tagName --jq '[.[].tagName | select(. != env.TAG_NAME)][0] // ""')
          NOTE_FILE="docs/release-notes/${TAG_NAME}.md"
          {
            echo "## 更新内容"
            echo
            if [ -f "$NOTE_FILE" ]; then
              cat "$NOTE_FILE"
            else
              if [ -n "$PREVIOUS_TAG" ]; then
                UPDATE_COUNT=$(git rev-list --count "$PREVIOUS_TAG..$TAG_NAME")
              else
                UPDATE_COUNT=$(git rev-list --count "$TAG_NAME")
              fi
              echo "- 本次版本包含 ${UPDATE_COUNT} 个提交更新，详细提交记录可在仓库提交历史中查看。"
              echo "- 已重新生成所有平台安装包，并同步上传到本次 Release。"
            fi
            echo
            echo
            echo "## 安装包"
            echo
            echo "- macOS：MaoqiuPlayer-macOS.dmg（内含 MaoqiuPlayer-macOS.pkg 安装器）"
            echo "- Windows：MaoqiuPlayer-Windows-Setup.exe"
            echo "- Linux：maoqiu-player_0.1.18_amd64.deb"
            echo "- Android：MaoqiuPlayer-Android.apk"
            echo "- iOS：MaoqiuPlayer-iOS.ipa（未签名）"
            echo
            echo "注意：当前包未做代码签名、公证或移动端商店签名。iOS IPA 为未签名构建，需要开发者证书后才能安装到真机。"
          } > release-notes.md
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "MaoqiuPlayer $TAG_NAME" \
              --notes-file release-notes.md
          fi
