name: Package MaoqiuPlayer

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  package:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: MaoqiuPlayer-macOS
            archive_name: MaoqiuPlayer-macOS.zip
          - os: windows-latest
            artifact_name: MaoqiuPlayer-Windows
            archive_name: MaoqiuPlayer-Windows.zip
          - os: ubuntu-latest
            artifact_name: MaoqiuPlayer-Linux
            archive_name: MaoqiuPlayer-Linux.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libpulse0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m pytest -q

      - name: Build app
        run: pyinstaller --noconfirm --clean --windowed --name MaoqiuPlayer main.py

      - name: Archive macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/MaoqiuPlayer.app "${{ matrix.archive_name }}"

      - name: Archive Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/MaoqiuPlayer -DestinationPath "${{ matrix.archive_name }}"

      - name: Archive Linux app
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip -r "../${{ matrix.archive_name }}" MaoqiuPlayer

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: MaoqiuPlayer-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ls -lh release-assets
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" release-assets/*.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "MaoqiuPlayer $TAG_NAME" \
              --notes "MaoqiuPlayer $TAG_NAME packaged by GitHub Actions. Includes macOS, Windows, and Linux builds."
          fi
