name: Package MaoqiuPlayer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: MaoqiuPlayer-macOS
            archive_name: MaoqiuPlayer-macOS.zip
          - os: windows-latest
            artifact_name: MaoqiuPlayer-Windows
            archive_name: MaoqiuPlayer-Windows.zip
          - os: ubuntu-latest
            artifact_name: MaoqiuPlayer-Linux
            archive_name: MaoqiuPlayer-Linux.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libpulse0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m pytest -q

      - name: Build app
        run: pyinstaller --noconfirm --clean --windowed --name MaoqiuPlayer main.py

      - name: Archive macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/MaoqiuPlayer.app "${{ matrix.archive_name }}"

      - name: Archive Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/MaoqiuPlayer -DestinationPath "${{ matrix.archive_name }}"

      - name: Archive Linux app
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip -r "../${{ matrix.archive_name }}" MaoqiuPlayer

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error
